<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quản lý xưởng PRO</title>
<script src="/socket.io/socket.io.js"></script>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: #f1f5f9;
  display: flex;
}

/* SIDEBAR */
.sidebar {
  width: 220px;
  background: #0f172a;
  color: white;
  height: 100vh;
  padding: 20px;
}

/* MAIN */
.main {
  flex: 1;
  padding: 20px;
}

/* DASHBOARD */
.dashboard {
  display: flex;
  gap: 15px;
  margin-bottom: 20px;
}

.card {
  flex: 1;
  background: white;
  padding: 15px;
  border-radius: 10px;
  text-align: center;
}

/* FORM */
.box {
  background: white;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
}

input {
  padding: 10px;
  margin-right: 5px;
  border: 1px solid #ddd;
  border-radius: 6px;
}

button {
  padding: 10px 15px;
  background: #2563eb;
  color: white;
  border: none;
  border-radius: 6px;
}

/* TABLE */
table {
  width: 100%;
  background: white;
  border-collapse: collapse;
}

th {
  background: #1e293b;
  color: white;
  padding: 10px;
}

td {
  padding: 10px;
  text-align: center;
  border-top: 1px solid #eee;
}

td.note {
  text-align: left;
  max-width: 300px;
  word-break: break-word;
}

tr.done { background: #dcfce7; }
tr.late { background: #fee2e2; }

/* CHECK */
.check {
  width: 20px;
  height: 20px;
  border: 2px solid #94a3b8;
  border-radius: 5px;
  margin: auto;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.check.done {
  background: #22c55e;
  border-color: #22c55e;
  color: white;
}

/* BADGE */
.badge {
  padding: 5px 10px;
  border-radius: 6px;
  font-size: 12px;
}
.badge.doing { background: #e0f2fe; }
.badge.late { background: #fee2e2; }
.badge.done { background: #dcfce7; }

</style>
</head>

<body>

<div class="sidebar">
  <h2>🏭 Xưởng</h2>
</div>

<div class="main">

<h2>Dashboard</h2>

<div class="dashboard">
  <div class="card"><h3 id="doing">0</h3>Đang làm</div>
  <div class="card"><h3 id="late">0</h3>Trễ</div>
  <div class="card"><h3 id="done">0</h3>Đã giao</div>
</div>

<div class="box">
  <input id="name" placeholder="Tên sản phẩm">
  <input id="note" placeholder="Ghi chú">
  <input id="received" type="date">
  <input id="delivery" type="date">
  <button onclick="add()">Thêm</button>
</div>

<table>
<thead>
<tr>
<th style="width:180px;">Sản phẩm</th>
<th>Ghi chú</th>
<th style="width:110px;">Nhận</th>
<th style="width:110px;">Giao</th>
<th>Cắt CNC</th>
<th>Dán chỉ</th>
<th>Dán flim</th>
<th>Làm nguội</th>
<th>Trạng thái</th>
<th>Đã giao</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<h3>Đơn đã giao</h3>
<table>
<tbody id="doneTable"></tbody>
</table>

</div>

<script>
const socket = io();
let tasks = [];

socket.on("data", (data) => {
  tasks = data;
  render();
});

function add() {
  socket.emit("add", {
    name: name.value,
    note: note.value,
    received: received.value,
    delivery: delivery.value
  });

  name.value = "";
  note.value = "";
  received.value = "";
  delivery.value = "";
}

function toggle(i, field) {
  socket.emit("toggle", { index: i, field });
}

function render() {
  let html = "";
  let doneHtml = "";

  let today = new Date().toISOString().split("T")[0];

  let doing=0, late=0, done=0;

  tasks.forEach((t,i)=>{

    if(t.delivered){
      done++;
      doneHtml += `<tr>
        <td>${t.name}</td>
        <td>${t.note||""}</td>
        <td>${t.received||""}</td>
        <td>${t.delivery||""}</td>
      </tr>`;
      return;
    }

    let isLate = t.delivery && t.delivery === today && !t.delivered;

    if(isLate) late++;
    else doing++;

    let status = isLate
      ? '<span class="badge late">Trễ</span>'
      : t.done
      ? '<span class="badge done">Xong</span>'
      : '<span class="badge doing">Đang làm</span>';

    html += `
    <tr class="${t.done?'done':''} ${isLate?'late':''}">
      <td>${t.name}</td>
      <td class="note">${t.note||""}</td>
      <td>${t.received||""}</td>
      <td>${t.delivery||""}</td>

      ${check(i,'cat',t.cat)}
      ${check(i,'dan',t.dan)}
      ${check(i,'son',t.son)}
      ${check(i,'lap',t.lap)}

      <td>${status}</td>

      <td onclick="toggle(${i},'delivered')">
        <div class="check ${t.delivered?'done':''}">
          ${t.delivered?'✓':''}
        </div>
      </td>
    </tr>`;
  });

  document.getElementById("table").innerHTML = html;
  document.getElementById("doneTable").innerHTML = doneHtml;

  document.getElementById("doing").innerText = doing;
  document.getElementById("late").innerText = late;
  document.getElementById("done").innerText = done;
}

function check(i,field,val){
  return `
  <td onclick="toggle(${i},'${field}')">
    <div class="check ${val?'done':''}">
      ${val?'✓':''}
    </div>
  </td>`;
}
</script>

</body>
</html>
