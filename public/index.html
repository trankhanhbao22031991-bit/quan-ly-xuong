<!-- ... (giữ nguyên phần CSS) ... -->

<div class="box">
  <input id="inp_name" placeholder="Tên sản phẩm">
  <input id="inp_note" placeholder="Ghi chú">
  <input id="inp_received" type="date">
  <input id="inp_delivery" type="date">
  <button onclick="add()">Thêm</button>
</div>

<!-- ... (giữ nguyên phần Table) ... -->

<script>
const socket = io();
let tasks = [];

// Thêm sản phẩm
function add() {
  const nameVal = document.getElementById("inp_name").value;
  const noteVal = document.getElementById("inp_note").value;
  const recVal = document.getElementById("inp_received").value;
  const delVal = document.getElementById("inp_delivery").value;

  if (!nameVal) return alert("Vui lòng nhập tên sản phẩm!");

  socket.emit("add", {
    name: nameVal,
    note: noteVal,
    received: recVal,
    delivery: delVal
  });

  // Reset form
  document.getElementById("inp_name").value = "";
  document.getElementById("inp_note").value = "";
}

// Thay i bằng t.id để tránh lỗi khi mảng bị thay đổi thứ tự
function toggle(id, field) {
  socket.emit("toggle", { id, field });
}

socket.on("data", (data) => {
  tasks = data || [];
  render();
});

function render() {
  let html = "";
  let doneHtml = "";

  tasks.forEach((t) => {
    if (t.delivered) {
      doneHtml += `<tr><td>${t.name}</td><td>${t.note}</td><td>${t.received}</td><td>${t.delivery}</td></tr>`;
      return;
    }

    html += `
    <tr>
      <td>**${t.name}**</td>
      <td class="note">${t.note}</td>
      <td>${t.received}</td>
      <td>${t.delivery}</td>
      <td onclick="toggle('${t.id}','cat')"><div class="check ${t.cat?'done':''}"></div></td>
      <td onclick="toggle('${t.id}','dan')"><div class="check ${t.dan?'done':''}"></div></td>
      <td onclick="toggle('${t.id}','son')"><div class="check ${t.son?'done':''}"></div></td>
      <td onclick="toggle('${t.id}','lap')"><div class="check ${t.lap?'done':''}"></div></td>
      <td>${t.done ? "✔" : ""}</td>
      <td onclick="toggle('${t.id}','delivered')"><div class="check ${t.delivered?'done':''}"></div></td>
    </tr>`;
  });

  document.getElementById("table").innerHTML = html;
  document.getElementById("doneTable").innerHTML = doneHtml;
}
</script>
