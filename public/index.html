<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ERP Quản lý xưởng</title>
<script src="/socket.io/socket.io.js"></script>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", Arial;
  background: #eef2f7;
}

.topbar {
  background: #111827;
  color: white;
  padding: 12px 20px;
  font-size: 18px;
  font-weight: bold;
}

.box {
  background: white;
  margin: 10px;
  padding: 10px;
  border-radius: 10px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

input, button {
  padding: 10px;
  border: 1px solid #ddd;
  border-radius: 8px;
}

button {
  background: #2563eb;
  color: white;
  border: none;
  cursor: pointer;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin: 10px;
  background: white;
  border-radius: 10px;
  overflow: hidden;
}

th {
  background: #0f172a;
  color: white;
  padding: 10px;
  font-size: 12px;
}

td {
  padding: 10px;
  border-top: 1px solid #eee;
  text-align: center;
  font-size: 13px;
}

/* ✅ CỘT GHI CHÚ RỘNG */
td.note {
  text-align: left;
  width: 320px;
  max-width: 320px;
  min-width: 250px;
  word-break: break-word;
  white-space: pre-wrap;
  font-size: 13px;
  color: #111827;
}

.late {
  background: #fee2e2;
}

/* CHECK TICK PRO */
.tick {
  width: 20px;
  height: 20px;
  border-radius: 6px;
  border: 2px solid #9ca3af;
  margin: auto;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  color: transparent;
  font-weight: bold;
}

.tick.done {
  background: #22c55e;
  border-color: #22c55e;
  color: white;
}
</style>
</head>

<body>

<div class="topbar">📊 ERP QUẢN LÝ XƯỞNG</div>

<div class="box">
  <input id="name" placeholder="Sản phẩm">
  <input id="note" placeholder="Ghi chú">
  <input id="received" type="date">
  <input id="delivery" type="date">
  <button onclick="add()">+ Thêm đơn</button>
</div>

<table>
<thead>
<tr>
<th>Sản phẩm</th>
<th>Ghi chú</th>
<th>Nhận</th>
<th>Giao</th>

<th>Cắt</th>
<th>Dán chỉ</th>
<th>Dán film</th>
<th>Làm nguội</th>

<th>Xong</th>
<th>Đã giao</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

<h3 style="margin-left:10px;">Đơn đã giao</h3>
<table>
<tbody id="doneTable"></tbody>
</table>

<script>
const socket = io({
  transports: ["websocket"]
});

let tasks = [];

/* DATA */
socket.on("data", (data) => {
  tasks = data || [];
  render();
});

/* ADD */
function add() {
  socket.emit("add", {
    name: name.value,
    note: note.value,
    received: received.value,
    delivery: delivery.value
  });

  name.value = "";
  note.value = "";
  received.value = "";
  delivery.value = "";
}

/* TOGGLE */
function toggle(i, field) {
  socket.emit("toggle", { index: i, field });
}

/* RENDER */
function render() {

  let html = "";
  let doneHtml = "";

  tasks.forEach((t, i) => {

    if (t.delivered) {
      doneHtml += `
        <tr>
          <td>${t.name}</td>
          <td>${t.note || ""}</td>
          <td>${t.received || ""}</td>
          <td>${t.delivery || ""}</td>
        </tr>
      `;
      return;
    }

    html += `
    <tr>
      <td>${t.name}</td>

      <td class="note">${t.note || ""}</td>

      <td>${t.received || ""}</td>
      <td>${t.delivery || ""}</td>

      <td onclick="toggle(${i},'cat')"><div class="tick ${t.cat?'done':''}">✓</div></td>
      <td onclick="toggle(${i},'dan')"><div class="tick ${t.dan?'done':''}">✓</div></td>
      <td onclick="toggle(${i},'son')"><div class="tick ${t.son?'done':''}">✓</div></td>
      <td onclick="toggle(${i},'lap')"><div class="tick ${t.lap?'done':''}">✓</div></td>

      <td>${t.done ? "✓" : ""}</td>

      <td onclick="toggle(${i},'delivered')">
        <div class="tick ${t.delivered?'done':''}">✓</div>
      </td>
    </tr>
    `;
  });

  table.innerHTML = html;
  doneTable.innerHTML = doneHtml;
}
</script>

</body>
</html>
