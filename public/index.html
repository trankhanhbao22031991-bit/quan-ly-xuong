<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quản lý xưởng</title>
<script src="/socket.io/socket.io.js"></script>

<style>
body {
  font-family: Arial;
  background:#f3f4f6;
  padding:20px;
}

.box {
  background:#fff;
  padding:10px;
  margin-bottom:10px;
  border:1px solid #ddd;
}

table {
  width:100%;
  background:#fff;
  border-collapse:collapse;
  margin-bottom:20px;
}

th {
  background:#e5e7eb;
  padding:10px;
}

td {
  padding:10px;
  border-top:1px solid #eee;
  text-align:center;
}

td.note {
  text-align:left;
  max-width:250px;
  word-break:break-word;
}

tr.done { background:#dcfce7; }

.check {
  width:16px;
  height:16px;
  border:1px solid #555;
  margin:auto;
  cursor:pointer;
}

.check.done {
  background:#22c55e;
}
</style>
</head>

<body>

<h3>Đơn đang làm</h3>

<div class="box">
  <input id="name" placeholder="Tên sản phẩm">
  <input id="note" placeholder="Ghi chú">
  <input id="received" type="date">
  <input id="delivery" type="date">
  <button onclick="add()">Thêm</button>
</div>

<table>
<thead>
<tr>
<th>Sản phẩm</th>
<th>Ghi chú</th>
<th>Nhận</th>
<th>Giao</th>
<th>Cắt CNC</th>
<th>Dán chỉ</th>
<th>Dán flim</th>
<th>Làm nguội</th>
<th>Xong</th>
<th>Đã giao</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<h3>Đơn đã giao</h3>

<table>
<thead>
<tr>
<th>Sản phẩm</th>
<th>Ghi chú</th>
<th>Nhận</th>
<th>Giao</th>
</tr>
</thead>
<tbody id="doneTable"></tbody>
</table>

<script>
const socket = io();
let tasks = [];

/* ===================== DATA ===================== */
socket.on("data", (data) => {
  tasks = data || [];
  render();
});

/* ===================== ADD SAFE ===================== */
function add() {
  const nameEl = document.getElementById("name");
  const noteEl = document.getElementById("note");
  const receivedEl = document.getElementById("received");
  const deliveryEl = document.getElementById("delivery");

  const name = nameEl.value.trim();
  const note = noteEl.value.trim();
  const received = receivedEl.value;
  const delivery = deliveryEl.value;

  if (!name) return alert("Nhập tên sản phẩm");

  socket.emit("add", {
    name,
    note,
    received,
    delivery
  });

  nameEl.value = "";
  noteEl.value = "";
  receivedEl.value = "";
  deliveryEl.value = "";
}

/* ===================== TOGGLE ===================== */
function toggle(i, field) {
  socket.emit("toggle", { index: i, field });
}

/* ===================== RENDER ===================== */
function render() {
  let html = "";
  let doneHtml = "";

  tasks.forEach((t, i) => {

    // safe default
    t.cat = !!t.cat;
    t.dan = !!t.dan;
    t.son = !!t.son;
    t.lap = !!t.lap;
    t.done = !!t.done;
    t.delivered = !!t.delivered;

    // đơn đã giao
    if (t.delivered) {
      doneHtml += `
        <tr>
          <td>${t.name || ""}</td>
          <td class="note">${t.note || ""}</td>
          <td>${t.received || ""}</td>
          <td>${t.delivery || ""}</td>
        </tr>
      `;
      return;
    }

    html += `
    <tr class="${t.done ? 'done' : ''}">
      <td>${t.name || ""}</td>

      <td class="note">${t.note || ""}</td>

      <td>${t.received || ""}</td>
      <td>${t.delivery || ""}</td>

      <td onclick="toggle(${i},'cat')"><div class="check ${t.cat?'done':''}"></div></td>
      <td onclick="toggle(${i},'dan')"><div class="check ${t.dan?'done':''}"></div></td>
      <td onclick="toggle(${i},'son')"><div class="check ${t.son?'done':''}"></div></td>
      <td onclick="toggle(${i},'lap')"><div class="check ${t.lap?'done':''}"></div></td>

      <td>
        <div class="check ${t.done?'done':''}"></div>
      </td>

      <td onclick="toggle(${i},'delivered')">
        <div class="check ${t.delivered?'done':''}"></div>
      </td>
    </tr>
    `;
  });

  document.getElementById("table").innerHTML = html;
  document.getElementById("doneTable").innerHTML = doneHtml;
}
</script>

</body>
</html>
