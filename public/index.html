<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quản lý xưởng</title>
<script src="/socket.io/socket.io.js"></script>

<style>
body { font-family: Arial; padding: 20px; }
table { border-collapse: collapse; width: 100%; }
td, th { border: 1px solid #ccc; padding: 10px; text-align: center; }

.done { background: #c8f7c5; }

.tick {
  cursor: pointer;
  font-size: 18px;
}
</style>
</head>

<body>

<h2>Quản lý công việc xưởng</h2>

<input id="name" placeholder="Tên sản phẩm">
<input id="worker" placeholder="Người làm">
<button onclick="add()">Thêm</button>

<table>
  <thead>
    <tr>
      <th>Sản phẩm</th>
      <th>Người</th>
      <th>Cắt</th>
      <th>Dán</th>
      <th>Sơn</th>
      <th>Làm nguội</th>
      <th>Xong</th>
    </tr>
  </thead>
  <tbody id="table"></tbody>
</table>

<script>
const socket = io();
let tasks = [];

socket.on("data", (data) => {
  tasks = data;
  render();
});

// thêm sản phẩm
function add() {
  let name = document.getElementById("name").value;
  let worker = document.getElementById("worker").value;

  if (!name || !worker) return;

  socket.emit("add", {
    name,
    worker,
    cat: false,
    dan: false,
    son: false,
    lap: false,
    done: false
  });

  document.getElementById("name").value = "";
  document.getElementById("worker").value = "";
}

// click tick
function toggle(i, field) {
  socket.emit("toggle", { index: i, field });
}

// render bảng
function render() {
  let html = "";

  tasks.forEach((t, i) => {
    // fix dữ liệu cũ
    t.cat = t.cat || false;
    t.dan = t.dan || false;
    t.son = t.son || false;
    t.lap = t.lap || false;
    t.done = t.done || false;

    html += `
      <tr class="${t.done ? 'done' : ''}">
        <td>${t.name}</td>
        <td>${t.worker}</td>

        <td class="tick" style="color:${t.cat?'green':'red'}" onclick="toggle(${i},'cat')">
          ${t.cat ? '✔' : '✘'}
        </td>

        <td class="tick" style="color:${t.dan?'green':'red'}" onclick="toggle(${i},'dan')">
          ${t.dan ? '✔' : '✘'}
        </td>

        <td class="tick" style="color:${t.son?'green':'red'}" onclick="toggle(${i},'son')">
          ${t.son ? '✔' : '✘'}
        </td>

        <td class="tick" style="color:${t.lap?'green':'red'}" onclick="toggle(${i},'lap')">
          ${t.lap ? '✔' : '✘'}
        </td>

        <td>${t.done ? '✔' : ''}</td>
      </tr>
    `;
  });

  document.getElementById("table").innerHTML = html;
}
</script>

</body>
</html>
