<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quản lý xưởng</title>
<script src="/socket.io/socket.io.js"></script>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f1f3f6;
  padding: 20px;
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

/* INPUT BOX */
.box {
  background: white;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 20px;
}

input {
  padding: 10px;
  margin: 5px;
  width: 42%;
  border: 1px solid #ddd;
  border-radius: 8px;
}

button {
  padding: 10px 15px;
  background: black;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

/* CARD */
.card {
  background: white;
  padding: 18px;
  border-radius: 14px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.06);
  margin-bottom: 15px;
}

.header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 15px;
}

.name {
  font-weight: 600;
}

.worker {
  font-size: 13px;
  color: gray;
}

/* TIMELINE */
.timeline {
  display: flex;
  align-items: center;
}

.step {
  flex: 1;
  text-align: center;
  position: relative;
}

.line {
  position: absolute;
  top: 9px;
  left: 50%;
  width: 100%;
  height: 2px;
  background: #e5e7eb;
  z-index: -1;
}

.step:last-child .line {
  display: none;
}

/* TICK */
.tick {
  width: 20px;
  height: 20px;
  border: 2px solid #bbb;
  border-radius: 5px;
  margin: auto;
  cursor: pointer;
  position: relative;
  transition: 0.2s;
}

.tick.done {
  background: #16a34a;
  border-color: #16a34a;
}

.tick.done::after {
  content: "✔";
  color: white;
  font-size: 12px;
  position: absolute;
  top: -2px;
  left: 3px;
}

.label {
  font-size: 12px;
  margin-top: 6px;
}

.date {
  font-size: 10px;
  color: #999;
}
</style>
</head>

<body>

<h2>📦 Quản lý công việc xưởng</h2>

<div class="box">
  <input id="name" placeholder="Tên sản phẩm">
  <input id="worker" placeholder="Người làm">
  <button onclick="add()">➕ Thêm</button>
</div>

<div id="list"></div>

<script>
const socket = io();
let tasks = [];

socket.on("data", (data) => {
  tasks = data;
  render();
});

function add() {
  let name = document.getElementById("name").value;
  let worker = document.getElementById("worker").value;

  if (!name || !worker) return;

  socket.emit("add", {
    name,
    worker,
    ngayNhan: new Date().toLocaleDateString(),
    cat: false,
    dan: false,
    son: false,
    lap: false,
    done: false
  });

  document.getElementById("name").value = "";
  document.getElementById("worker").value = "";
}

function toggle(i, field) {
  socket.emit("toggle", { index: i, field });
}

function render() {
  let html = "";

  tasks.forEach((t, i) => {

    html += `
      <div class="card">
        <div class="header">
          <div class="name">${t.name}</div>
          <div class="worker">👷 ${t.worker}</div>
        </div>

        <div class="timeline">

          ${step("Nhận", true, t.ngayNhan)}

          ${step("Cắt", t.cat, "", i, "cat")}
          ${step("Dán chỉ", t.dan, "", i, "dan")}
          ${step("Dán film", t.son, "", i, "son")}
          ${step("Làm nguội", t.lap, "", i, "lap")}
          ${step("Hoàn thành", t.done, "")}

        </div>
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

function step(label, done, date, i, field) {
  return `
    <div class="step">
      <div class="tick ${done ? 'done' : ''}"
        ${field ? `onclick="toggle(${i}, '${field}')"` : ''}
      ></div>

      <div class="label">${label}</div>
      <div class="date">${date || ""}</div>

      <div class="line"></div>
    </div>
  `;
}
</script>

</body>
</html>
