<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quản lý xưởng PRO</title>
<script src="/socket.io/socket.io.js"></script>

<style>
body {
  font-family: "Segoe UI", Arial;
  background: #eef1f5;
  padding: 20px;
}

/* DASHBOARD */
.dashboard {
  display: flex;
  gap: 15px;
  margin-bottom: 20px;
}

.card {
  flex: 1;
  background: white;
  padding: 15px;
  border-radius: 10px;
  text-align: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

.card h3 {
  margin: 0;
  font-size: 22px;
}

.card p {
  margin: 5px 0 0;
  color: #666;
}

/* FORM */
.box {
  background: white;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
}

input {
  padding: 10px;
  margin-right: 5px;
  border: 1px solid #ddd;
  border-radius: 6px;
}

button {
  padding: 10px 15px;
  background: #2563eb;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

/* TABLE */
.table-wrap {
  max-height: 400px;
  overflow: auto;
}

table {
  width: 100%;
  background: white;
  border-collapse: collapse;
}

th {
  position: sticky;
  top: 0;
  background: #1e293b;
  color: white;
  padding: 10px;
}

td {
  padding: 10px;
  border-top: 1px solid #eee;
  text-align: center;
}

tr:hover {
  background: #f9fafb;
}

tr.done { background: #dcfce7; }
tr.late { background: #fee2e2; }

/* CHECKBOX XỊN */
.check {
  width: 20px;
  height: 20px;
  border-radius: 5px;
  border: 2px solid #94a3b8;
  margin: auto;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: 0.2s;
}

.check.done {
  background: #22c55e;
  border-color: #22c55e;
  animation: pop 0.2s ease;
}

@keyframes pop {
  0% { transform: scale(0.5); }
  100% { transform: scale(1); }
}

/* SEARCH */
.search {
  margin-bottom: 10px;
}
</style>
</head>

<body>

<h2>📊 Tổng quan</h2>

<div class="dashboard">
  <div class="card">
    <h3 id="countDoing">0</h3>
    <p>Đang làm</p>
  </div>
  <div class="card">
    <h3 id="countLate">0</h3>
    <p>Trễ</p>
  </div>
  <div class="card">
    <h3 id="countDone">0</h3>
    <p>Đã giao</p>
  </div>
</div>

<div class="box">
  <input id="name" placeholder="Tên sản phẩm">
  <input id="received" type="date">
  <input id="delivery" type="date">
  <button onclick="add()">➕ Thêm</button>
</div>

<input id="search" class="search" placeholder="🔍 Tìm sản phẩm..." oninput="render()">

<div class="table-wrap">
<table>
<thead>
<tr>
<th>Sản phẩm</th>
<th>Nhận</th>
<th>Giao</th>
<th>Cắt CNC</th>
<th>Dán chỉ</th>
<th>Dán flim</th>
<th>Làm nguội</th>
<th>Xong</th>
<th>Đã giao</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

<h2>🚚 Đơn đã giao</h2>
<table>
<tbody id="doneTable"></tbody>
</table>

<script>
const socket = io();
let tasks = [];

socket.on("data", (data) => {
  tasks = data;
  render();
});

function add() {
  const name = document.getElementById("name").value.trim();
  const received = document.getElementById("received").value;
  const delivery = document.getElementById("delivery").value;

  if (!name) return alert("Nhập tên");

  socket.emit("add", { name, received, delivery });

  document.getElementById("name").value = "";
}

function toggle(i, field) {
  socket.emit("toggle", { index: i, field });
}

function render() {
  let html = "";
  let doneHtml = "";

  const keyword = document.getElementById("search").value.toLowerCase();
  const today = new Date().toISOString().split("T")[0];

  let doing = 0, late = 0, done = 0;

  tasks.forEach((t, i) => {

    if (!t.name.toLowerCase().includes(keyword)) return;

    if (t.delivered) {
      done++;
      doneHtml += `<tr><td>${t.name}</td><td>${t.received}</td><td>${t.delivery}</td></tr>`;
      return;
    }

    doing++;

    const isLate = t.delivery && t.delivery < today && !t.done;
    if (isLate) late++;

    html += `
    <tr class="${t.done?'done':''} ${isLate?'late':''}">
      <td>${t.name}</td>
      <td>${t.received||""}</td>
      <td>${t.delivery||""}</td>

      ${makeCheck(i,'cat',t.cat)}
      ${makeCheck(i,'dan',t.dan)}
      ${makeCheck(i,'son',t.son)}
      ${makeCheck(i,'lap',t.lap)}
      ${makeCheck(-1,'done',t.done,false)}
      ${makeCheck(i,'delivered',t.delivered)}
    </tr>`;
  });

  document.getElementById("table").innerHTML = html;
  document.getElementById("doneTable").innerHTML = doneHtml;

  document.getElementById("countDoing").innerText = doing;
  document.getElementById("countLate").innerText = late;
  document.getElementById("countDone").innerText = done;
}

function makeCheck(i, field, val, clickable=true) {
  return `
  <td ${clickable?`onclick="toggle(${i},'${field}')"`:''}>
    <div class="check ${val?'done':''}">
      ${val?'✓':''}
    </div>
  </td>`;
}
</script>

</body>
</html>
