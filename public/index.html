<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ERP Xưởng</title>
<script src="/socket.io/socket.io.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f4f6fa;
}

/* LOGIN */
#loginBox {
  width: 300px;
  margin: 120px auto;
  background: white;
  padding: 20px;
  border-radius: 12px;
}

#loginBox input {
  width: 100%;
  margin-bottom: 10px;
  padding: 10px;
}

/* MAIN */
.main { display:none; padding:20px; }

.box {
  background:white;
  padding:10px;
  margin-bottom:10px;
  display:flex;
  gap:6px;
}

input, button {
  padding:8px;
}

table {
  width:100%;
  background:white;
  border-collapse:collapse;
}

th {
  background:#111827;
  color:white;
  padding:10px;
}

td {
  padding:10px;
  border-top:1px solid #eee;
  text-align:center;
}

.check {
  width:18px;
  height:18px;
  border:2px solid #999;
  border-radius:4px;
  cursor:pointer;
}

.check.done {
  background:#22c55e;
}
</style>
</head>

<body>

<div id="loginBox">
  <h3>Login</h3>
  <input id="username" placeholder="user">
  <input id="password" type="password" placeholder="pass">
  <button onclick="login()">Login</button>
</div>

<div class="main" id="main">

<div class="box">
  <input id="name" placeholder="Tên SP">
  <input id="note" placeholder="Ghi chú">
  <input id="received" type="date">
  <input id="delivery" type="date">
  <button onclick="add()">Thêm</button>
</div>

<table>
<thead>
<tr>
<th>SP</th>
<th>Note</th>
<th>Nhận</th>
<th>Giao</th>
<th>Cắt</th>
<th>Dán</th>
<th>Sơn</th>
<th>Lắp</th>
<th>Xong</th>
<th>Giao</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

</div>

<script>
const socket = io({
  transports: ["websocket"],
  reconnection: true,
  reconnectionDelay: 300
});

let role = null;
let tasks = [];

/* LOGIN */
function login() {
  socket.emit("login", {
    username: username.value,
    password: password.value
  });
}

socket.on("login_success", (data) => {
  role = data.role;

  loginBox.style.display = "none";
  main.style.display = "block";

  socket.emit("request_data");
});

socket.on("login_fail", () => {
  alert("Sai login");
});

/* DATA */
socket.on("data", (data) => {
  tasks = data || [];
  render();
});

/* ADD */
function add() {
  if (role !== "admin") return alert("No permission");

  socket.emit("add", {
    name: name.value,
    note: note.value,
    received: received.value,
    delivery: delivery.value
  });
}

/* TOGGLE */
function toggle(i, f) {
  socket.emit("toggle", { index: i, field: f });
}

function toggleDelivered(i) {
  if (role !== "admin") return;
  socket.emit("toggle", { index: i, field: "delivered" });
}

/* RENDER */
function render() {
  let html = "";

  tasks.forEach((t, i) => {

    if (t.delivered) return;

    html += `
    <tr>
      <td>${t.name}</td>
      <td>${t.note}</td>
      <td>${t.received}</td>
      <td>${t.delivery}</td>

      <td onclick="toggle(${i},'cat')"><div class="check ${t.cat?'done':''}"></div></td>
      <td onclick="toggle(${i},'dan')"><div class="check ${t.dan?'done':''}"></div></td>
      <td onclick="toggle(${i},'son')"><div class="check ${t.son?'done':''}"></div></td>
      <td onclick="toggle(${i},'lap')"><div class="check ${t.lap?'done':''}"></div></td>

      <td>${t.done ? "✔" : ""}</td>

      <td onclick="toggleDelivered(${i})">
        <div class="check ${t.delivered?'done':''}"></div>
      </td>
    </tr>
    `;
  });

  table.innerHTML = html;
}
</script>

</body>
</html>
