<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quản lý xưởng</title>
<script src="/socket.io/socket.io.js"></script>

<style>
body { font-family: Arial; background:#f3f4f6; padding:20px; }

h2 { margin-bottom:10px; }

.box {
  background:#fff;
  padding:10px;
  margin-bottom:15px;
  border:1px solid #ddd;
}

input {
  padding:8px;
  margin-right:5px;
}

button {
  padding:8px 12px;
  background:#2563eb;
  color:#fff;
  border:none;
  cursor:pointer;
}

table {
  width:100%;
  background:#fff;
  border-collapse:collapse;
  margin-bottom:20px;
}

th { background:#e5e7eb; padding:10px; }
td { padding:10px; border-top:1px solid #eee; text-align:center; }

tr.done { background:#dcfce7; }

.check {
  width:16px;height:16px;border:1px solid #555;
  margin:auto;cursor:pointer;
}
.check.done { background:#2563eb; }
</style>
</head>

<body>

<h2>Đơn đang làm</h2>

<div class="box">
  <input id="name" placeholder="Tên sản phẩm">
  <input id="received" type="date">
  <input id="delivery" type="date">
  <button onclick="add()">Thêm</button>
</div>

<table>
<thead>
<tr>
<th>Sản phẩm</th>
<th>Nhận</th>
<th>Giao</th>
<th>Cắt</th>
<th>Dán</th>
<th>Sơn</th>
<th>Lắp</th>
<th>Xong</th>
<th>Đã giao</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<h2>Đơn đã giao</h2>

<table>
<thead>
<tr>
<th>Sản phẩm</th>
<th>Nhận</th>
<th>Giao</th>
</tr>
</thead>
<tbody id="doneTable"></tbody>
</table>

<script>
const socket = io();
let tasks = [];

socket.on("data", (data) => {
  tasks = data;
  render();
});

function add() {
  const nameInput = document.getElementById("name");
  const receivedInput = document.getElementById("received");
  const deliveryInput = document.getElementById("delivery");

  const name = nameInput.value.trim();
  const received = receivedInput.value;
  const delivery = deliveryInput.value;

  if (!name) {
    alert("Nhập tên sản phẩm");
    return;
  }

  socket.emit("add", { name, received, delivery });

  nameInput.value = "";
  receivedInput.value = "";
  deliveryInput.value = "";
}

function toggle(i, field) {
  socket.emit("toggle", { index: i, field });
}

function render() {
  let html = "";
  let doneHtml = "";

  tasks.forEach((t, i) => {

    if (t.delivered) {
      doneHtml += `
        <tr>
          <td>${t.name}</td>
          <td>${t.received || ""}</td>
          <td>${t.delivery || ""}</td>
        </tr>
      `;
      return;
    }

    html += `
    <tr class="${t.done ? 'done' : ''}">
      <td>${t.name}</td>
      <td>${t.received || ""}</td>
      <td>${t.delivery || ""}</td>

      <td onclick="toggle(${i},'cat')"><div class="check ${t.cat?'done':''}"></div></td>
      <td onclick="toggle(${i},'dan')"><div class="check ${t.dan?'done':''}"></div></td>
      <td onclick="toggle(${i},'son')"><div class="check ${t.son?'done':''}"></div></td>
      <td onclick="toggle(${i},'lap')"><div class="check ${t.lap?'done':''}"></div></td>

      <td><div class="check ${t.done?'done':''}"></div></td>

      <td onclick="toggle(${i},'delivered')">
        <div class="check ${t.delivered?'done':''}"></div>
      </td>
    </tr>
    `;
  });

  document.getElementById("table").innerHTML = html;
  document.getElementById("doneTable").innerHTML = doneHtml;
}
</script>

</body>
</html>
