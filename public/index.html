<script>
const socket = io();
let tasks=[];

/* DATA */
socket.on("data",(data)=>{
  tasks=data||[];
  render();
});

/* ADD */
function add(){
  socket.emit("add",{
    name:name.value,
    note:note.value,
    received:received.value,
    delivery:delivery.value
  });

  name.value="";
  note.value="";
  received.value="";
  delivery.value="";
}

/* TOGGLE BY ID (QUAN TRỌNG) */
function toggle(id,field){
  socket.emit("toggle",{id,field});
}

/* LATE */
function lateLevel(t){
  if(!t.delivery || t.delivered) return 0;
  const diff=Math.floor((new Date()-new Date(t.delivery))/86400000);
  if(diff>=2) return 2;
  if(diff>=0) return 1;
  return 0;
}

/* RENDER */
function render(){

  let html="";
  let late=0;

  const sorted=[...tasks].sort((a,b)=>lateLevel(b)-lateLevel(a));

  sorted.forEach(t=>{

    const lv=lateLevel(t);
    if(lv>0) late++;

    let cls="";
    if(lv===1) cls="late1";
    if(lv===2) cls="late2";

    html+=`
    <tr class="${cls}">
      <td>${t.name}</td>
      <td>${t.note}</td>
      <td>${t.received}</td>
      <td>${t.delivery}</td>

      <td onclick="toggle('${t.id}','cat')">✔</td>
      <td onclick="toggle('${t.id}','dan')">✔</td>
      <td onclick="toggle('${t.id}','son')">✔</td>
      <td onclick="toggle('${t.id}','lap')">✔</td>

      <td>${t.done?"✓":""}</td>

      <td onclick="toggle('${t.id}','delivered')">🚚</td>
    </tr>
    `;
  });

  table.innerHTML=html;
  lateEl().innerText=late;
}
</script>
