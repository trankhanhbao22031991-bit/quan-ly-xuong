<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quản lý xưởng</title>
<script src="/socket.io/socket.io.js"></script>

<style>
body {
  font-family: "Segoe UI", Arial;
  background: #eef1f5;
  padding: 20px;
}

/* header */
h2 {
  margin-bottom: 10px;
}

/* form */
.box {
  background: #fff;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

input {
  padding: 10px;
  margin-right: 8px;
  border: 1px solid #ddd;
  border-radius: 6px;
}

button {
  padding: 10px 15px;
  background: #2563eb;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  background: #1d4ed8;
}

/* table */
.table-wrap {
  max-height: 400px;
  overflow: auto;
  border-radius: 10px;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: #fff;
}

th {
  position: sticky;
  top: 0;
  background: #1e293b;
  color: white;
  padding: 12px;
  z-index: 1;
}

td {
  padding: 12px;
  border-bottom: 1px solid #eee;
  text-align: center;
}

tr:hover {
  background: #f9fafb;
}

tr.done {
  background: #dcfce7;
}

tr.late {
  background: #fee2e2;
}

/* checkbox */
.check {
  width: 18px;
  height: 18px;
  border-radius: 4px;
  border: 2px solid #94a3b8;
  margin: auto;
  cursor: pointer;
  transition: 0.2s;
}

.check.done {
  background: #22c55e;
  border-color: #22c55e;
}

/* badge */
.badge {
  padding: 4px 6px;
  border-radius: 6px;
  font-size: 11px;
  margin-left: 5px;
}

.badge.late {
  background: #ef4444;
  color: white;
}
</style>
</head>

<body>

<h2>📦 Đơn đang làm</h2>

<div class="box">
  <input id="name" placeholder="Tên sản phẩm">
  <input id="received" type="date">
  <input id="delivery" type="date">
  <button onclick="add()">➕ Thêm</button>
</div>

<div class="table-wrap">
<table>
<thead>
<tr>
<th>Sản phẩm</th>
<th>Nhận</th>
<th>Giao</th>
<th>Cắt</th>
<th>Dán</th>
<th>Sơn</th>
<th>Lắp</th>
<th>Xong</th>
<th>Đã giao</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

<h2>🚚 Đơn đã giao</h2>

<table>
<thead>
<tr>
<th>Sản phẩm</th>
<th>Nhận</th>
<th>Giao</th>
</tr>
</thead>
<tbody id="doneTable"></tbody>
</table>

<script>
const socket = io();
let tasks = [];

socket.on("data", (data) => {
  tasks = data;
  render();
});

function add() {
  const nameInput = document.getElementById("name");
  const receivedInput = document.getElementById("received");
  const deliveryInput = document.getElementById("delivery");

  const name = nameInput.value.trim();
  const received = receivedInput.value;
  const delivery = deliveryInput.value;

  if (!name) {
    alert("Nhập tên sản phẩm");
    return;
  }

  socket.emit("add", { name, received, delivery });

  nameInput.value = "";
  receivedInput.value = "";
  deliveryInput.value = "";
}

function toggle(i, field) {
  socket.emit("toggle", { index: i, field });
}

function render() {
  let html = "";
  let doneHtml = "";

  const today = new Date().toISOString().split("T")[0];

  tasks.forEach((t, i) => {

    // đã giao
    if (t.delivered) {
      doneHtml += `
        <tr>
          <td><b>${t.name}</b></td>
          <td>${t.received || ""}</td>
          <td>${t.delivery || ""}</td>
        </tr>
      `;
      return;
    }

    // check trễ
    const isLate = t.delivery && t.delivery < today && !t.done;

    html += `
    <tr class="${t.done ? 'done' : ''} ${isLate ? 'late' : ''}">
      <td><b>${t.name}</b></td>

      <td>${t.received || ""}</td>

      <td>
        ${t.delivery || ""}
        ${isLate ? '<span class="badge late">Trễ</span>' : ''}
      </td>

      <td onclick="toggle(${i},'cat')">
        <div class="check ${t.cat?'done':''}"></div>
      </td>

      <td onclick="toggle(${i},'dan')">
        <div class="check ${t.dan?'done':''}"></div>
      </td>

      <td onclick="toggle(${i},'son')">
        <div class="check ${t.son?'done':''}"></div>
      </td>

      <td onclick="toggle(${i},'lap')">
        <div class="check ${t.lap?'done':''}"></div>
      </td>

      <td>
        <div class="check ${t.done?'done':''}"></div>
      </td>

      <td onclick="toggle(${i},'delivered')">
        <div class="check ${t.delivered?'done':''}"></div>
      </td>
    </tr>
    `;
  });

  document.getElementById("table").innerHTML = html;
  document.getElementById("doneTable").innerHTML = doneHtml;
}
</script>

</body>
</html>
